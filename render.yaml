services:
  - type: web
    name: growth-atlas-beta
    runtime: python
    plan: free
    region: singapore
    rootDir: .
    buildCommand: corepack enable && cd frontend && pnpm install --frozen-lockfile && pnpm run build && cd ../backend && pip install -e .
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: checksPass
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: NODE_VERSION
        value: 24.14.1
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ALLOWED_ORIGINS
        value: https://growth-atlas-beta.onrender.com
      - key: VITE_API_BASE_URL
        value: /api
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: KIMI_API_KEY
        sync: false
      - key: KIMI_MODEL
        value: moonshot-v1-8k
      - key: KIMI_BASE_URL
        value: https://api.moonshot.cn/v1
      - key: AI_TIMEOUT_SECONDS
        value: "60"
      - key: AI_OUTPUT_ATTEMPTS
        value: "2"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
